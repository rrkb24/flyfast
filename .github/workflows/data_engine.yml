name: Airport Data Engine

on:
  schedule:
    # Run every 10 minutes — well within GitHub Actions free tier (2,000 min/month)
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch TSA Data
        run: node scraper/fetch_engine.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/wait_times.json
          git diff --staged --quiet || git commit -m "data: refresh wait times $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
